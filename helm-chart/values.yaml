# --- App Container (Gradio) ---
app:
  image:
    repository: localhost:32000/cellpose-poc-app
    tag: latest
    pullPolicy: IfNotPresent
  port: 8001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# --- Model Container (FastAPI + Cellpose) ---
model:
  image:
    repository: localhost:32000/cellpose-poc-model
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  # Set to true only if the cluster has the NVIDIA device plugin enabled (microk8s enable gpu)
  useGpu: false
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

# --- Ingress ---
ingress:
  host: cellpose-poc.g007.imec.local
