# --- App Container (Gradio) ---
app:
  image:
    repository: localhost:32000/cellpose-poc-app
    tag: latest
    pullPolicy: IfNotPresent
  port: 8001
  # nodeSelector: {}  # leave empty to schedule on any node
  nodeSelector: {}
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# --- Model Container (FastAPI + Cellpose) ---
model:
  image:
    repository: localhost:32000/cellpose-poc-model
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  # Set to true when the cluster has the NVIDIA device plugin enabled (microk8s enable gpu).
  # Requires USE_CUDA=true build-arg in CI so the image contains CUDA PyTorch.
  useGpu: true
  # Number of GPUs to allocate per pod (nvidia.com/gpu resource limit).
  gpuCount: 1
  # nodeSelector: {}  # GPU pods are scheduled by nvidia.com/gpu resource requests, not labels
  nodeSelector: {}
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      # Realistic memory limit for Cellpose + PyTorch inference.
      # 16Gi allows: 8GB Cellpose peak + 4GB PyTorch/CUDA + 4GB overhead/buffer
      # Does NOT need 64Gi; that exceeds typical cluster node memory (60-128Gi).
      # 64Gi blocks pod scheduling if cluster is moderately loaded (~30-40GB available).
      # This causes Kubernetes to keep pod in Pending state indefinitely.
      # Which then causes Helm timeout: "client rate limiter Wait returned context deadline exceeded"
      cpu: 8000m
      memory: 16Gi

# --- Ingress ---
ingress:
  host: cellpose-poc.g007.imec.local

# --- PostgreSQL (persistence for segmentation history) ---
db:
  image: postgres:16-alpine
  port: 5432
  name: cellseg
  user: cellseg
  password: cellseg
  # nodeSelector: {}  # leave empty to schedule on any node
  nodeSelector: {}

# --- Admin account (auto-seeded at model startup when ADMIN_PASSWORD is set) ---
admin:
  username: admin
  password: ""
