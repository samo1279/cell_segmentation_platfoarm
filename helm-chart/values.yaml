# --- App Container (Gradio) ---
app:
  image:
    repository: localhost:32000/cellpose-poc-app
    tag: latest
    pullPolicy: Always
  port: 8001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# --- Model Container (FastAPI + Cellpose) ---
model:
  image:
    repository: localhost:32000/cellpose-poc-model
    tag: latest
    pullPolicy: Always
  port: 8000
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
      nvidia.com/gpu: 1
    limits:
      cpu: 4000m
      memory: 8Gi
      nvidia.com/gpu: 1

# --- Ingress ---
ingress:
  host: cellpose-poc.g007.imec.local
