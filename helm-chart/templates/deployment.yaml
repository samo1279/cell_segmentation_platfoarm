# --- App Container Deployment (Gradio UI) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app
    spec:
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gradio
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
              name: http
          env:
            # Point the app at the in-cluster model service
            - name: MODEL_URL
              value: "http://{{ .Release.Name }}-model:8000/segment"
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          # startupProbe prevents liveness from firing while Gradio loads (can take 30-60s).
          # 20 attempts × 5s = 100s max startup window.
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 40
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.port }}
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.port }}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
---
# --- Model Container Deployment (FastAPI + Cellpose) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-model
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-model
    spec:
      # GPU scheduling is driven by nvidia.com/gpu resource requests/limits below.
      # The NVIDIA device plugin schedules the pod on a GPU node automatically.
      # Set model.nodeSelector in values.yaml only if you need a specific node label.
      {{- with .Values.model.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.model.useGpu }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      {{- end }}
      # Wait for database to be ready before starting model container.
      # This prevents connection failures during model initialization.
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-db {{ .Values.db.port }}; do echo waiting for db; sleep 2; done']
      containers:
        - name: cellpose
          image: "{{ .Values.model.image.repository }}:{{ .Values.model.image.tag }}"
          imagePullPolicy: {{ .Values.model.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.model.port }}
              name: http
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: USE_GPU
              value: {{ .Values.model.useGpu | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.db.user }}:{{ .Values.db.password }}@{{ .Release.Name }}-db:{{ .Values.db.port }}/{{ .Values.db.name }}"
          resources:
            requests:
              cpu: {{ .Values.model.resources.requests.cpu }}
              memory: {{ .Values.model.resources.requests.memory }}
              {{- if .Values.model.useGpu }}
              nvidia.com/gpu: {{ .Values.model.gpuCount | quote }}
              {{- end }}
            limits:
              cpu: {{ .Values.model.resources.limits.cpu }}
              memory: {{ .Values.model.resources.limits.memory }}
              {{- if .Values.model.useGpu }}
              # nvidia.com/gpu MUST be in limits for the NVIDIA device plugin to
              # allocate a GPU to the pod. Without this, torch.cuda.is_available()
              # returns False even when USE_GPU=true and CUDA torch is installed.
              nvidia.com/gpu: {{ .Values.model.gpuCount | quote }}
              {{- end }}
          # startupProbe gates liveness entirely until /health returns 200.
          # This is the correct K8s pattern for slow-starting containers.
          # 30 attempts × 10 s = up to 300 s (5 min) for model to become ready.
          # During this window the liveness probe is DISABLED — pod is never killed.
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          # Once startupProbe succeeds, readiness keeps pod in service
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          # Liveness only kills on persistent failure after full startup
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
---
# --- PostgreSQL Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-db
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-db
    spec:
      {{- with .Values.db.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.db.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.db.port }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: POSTGRES_DB
              value: {{ .Values.db.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.db.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.password | quote }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.db.user | quote }}]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.db.user | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
