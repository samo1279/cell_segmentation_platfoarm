# --- App Container Deployment (Gradio UI) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app
    spec:
      nodeSelector:
        role: management
      containers:
        - name: gradio
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
              name: http
          env:
            # Point the app at the in-cluster model service
            - name: MODEL_URL
              value: "http://{{ .Release.Name }}-model:8000/segment"
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
# --- Model Container Deployment (FastAPI + Cellpose) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-model
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-model
    spec:
      nodeSelector:
        role: management
      containers:
        - name: cellpose
          image: "{{ .Values.model.image.repository }}:{{ .Values.model.image.tag }}"
          imagePullPolicy: {{ .Values.model.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.model.port }}
              name: http
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: USE_GPU
              value: {{ .Values.model.useGpu | quote }}
          resources:
            {{- toYaml .Values.model.resources | nindent 12 }}
          # /health returns 503 while the model loads, then 200.
          # readinessProbe keeps the pod out of rotation during load (503 = not ready).
          # livenessProbe only fires after 120 s so it never kills the pod during load.
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
