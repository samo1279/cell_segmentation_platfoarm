# --- App Container Deployment (Gradio UI) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app
    spec:
      nodeSelector:
        role: management
      containers:
        - name: gradio
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
              name: http
          env:
            # Point the app at the in-cluster model service
            - name: MODEL_URL
              value: "http://{{ .Release.Name }}-model:8000/segment"
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
# --- Model Container Deployment (FastAPI + Cellpose) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-model
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-model
    spec:
      nodeSelector:
        role: management
      containers:
        - name: cellpose
          image: "{{ .Values.model.image.repository }}:{{ .Values.model.image.tag }}"
          imagePullPolicy: {{ .Values.model.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.model.port }}
              name: http
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: USE_GPU
              value: {{ .Values.model.useGpu | quote }}
          resources:
            {{- toYaml .Values.model.resources | nindent 12 }}
          # startupProbe gates liveness entirely until /health returns 200.
          # This is the correct K8s pattern for slow-starting containers.
          # 30 attempts × 10 s = up to 300 s (5 min) for model to become ready.
          # During this window the liveness probe is DISABLED — pod is never killed.
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          # Once startupProbe succeeds, readiness keeps pod in service
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          # Liveness only kills on persistent failure after full startup
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.model.port }}
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
