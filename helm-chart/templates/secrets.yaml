# Kubernetes Secret for sensitive credentials.
# Values are base64-encoded at deploy time via --set flags in CI.
# NEVER store real passwords in values.yaml or this file directly.
#
# Ref: https://kubernetes.io/docs/concepts/configuration/secret/
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  db-password: {{ .Values.db.password | quote }}
