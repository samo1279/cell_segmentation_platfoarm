metadata:
  name: cellpose-segmentation
  namespace: cvat
  annotations:
    name: Cellpose (cyto3 / cpsam)
    type: detector
    framework: cellpose
    spec: |
      [{"id": 1, "name": "cell"}]

spec:
  description: >
    Cellpose cell segmentation — forwards annotation requests to the Model
    Container at http://model:8000/segment and converts the returned masks
    to CVAT polygon annotations.

  runtime: python:3.9
  handler: function:handler
  eventTimeout: 300s

  build:
    image: cvat-cellpose-serverless
    baseImage: python:3.9-slim
    directives:
      preBuild:
        - kind: RUN
          value: pip install --no-cache-dir requests numpy scikit-image

  triggers:
    httpTrigger:
      maxWorkers: 2
      kind: http
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 67108864   # 64 MB — enough for full-resolution microscopy images

  env:
    - name: MODEL_URL
      value: "http://model:8000/segment"
    - name: DEFAULT_MODEL_TYPE
      value: "cyto3"
    - name: DEFAULT_DIAMETER
      value: "0"
    - name: DEFAULT_FLOW_THRESHOLD
      value: "0.4"
    - name: DEFAULT_CELLPROB_THRESHOLD
      value: "0.0"

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
