# GPU override — apply on top of docker-compose.yml on Linux hosts with NVIDIA GPU.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Host prerequisites (one-time setup on the Linux server):
#   1. Install the NVIDIA driver:
#        ubuntu-drivers autoinstall   (or)   apt install nvidia-driver-535
#      Verify: nvidia-smi
#
#   2. Install nvidia-container-toolkit:
#        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-ct.gpg
#        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
#          | sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-ct.gpg] https://#g" \
#          | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#        sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#        sudo nvidia-ctk runtime configure --runtime=docker
#        sudo systemctl restart docker
#      Verify: docker run --rm --gpus all nvidia/cuda:12.1.1-base-ubuntu22.04 nvidia-smi
#
# NOTE: macOS Docker does NOT support NVIDIA GPU passthrough.
#       Build and test this configuration on a Linux machine with an NVIDIA GPU.

services:
  model:
    build:
      context: ./Model_container
      args:
        # Installs CUDA 12.1-enabled PyTorch wheels inside the image.
        # The resulting container requires only the NVIDIA driver on the host.
        USE_CUDA: "true"
    environment:
      - PYTHONUNBUFFERED=1
      # Tells CellposeModel(gpu=True) to use CUDA at inference time.
      - USE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all         # expose all available GPUs; change to count: 1 for single-GPU
              capabilities: [gpu]
        limits:
          # cpsam ViT-H weights (~2 GB) + activations + system RAM.
          # Increase if you process very large images (> 2048 × 2048).
          memory: 8G
