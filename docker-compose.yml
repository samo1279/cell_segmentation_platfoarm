services:
  app:
    build: ./App_container
    ports:
      - "8001:8001"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - MODEL_URL=http://model:8000/segment
    volumes:
      - images_volume:/data/images
      - results_volume:/data/results
    depends_on:
      model:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  model:
    build:
      context: ./Model_container
      args:
        # Builds CUDA 12.1-enabled PyTorch into the image at build time.
        USE_CUDA: "true"
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Tells CellposeModel(gpu=True) — must match USE_CUDA above.
      - USE_GPU=true
      - DATABASE_URL=postgresql://cellseg:cellseg@db:5432/cellseg
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Set API_KEY to a secret value to enable authentication; leave blank for open dev access.
      - API_KEY=
    volumes:
      - images_volume:/data/images
      - results_volume:/data/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          # cpsam ViT-H weights (~2 GB) + CUDA activations.
          memory: 8G

  celery_worker:
    build:
      context: ./Model_container
      args:
        USE_CUDA: "true"
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=1
    environment:
      - PYTHONUNBUFFERED=1
      - USE_GPU=true
      - DATABASE_URL=postgresql://cellseg:cellseg@db:5432/cellseg
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - API_KEY=
    volumes:
      - images_volume:/data/images
      - results_volume:/data/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=cellseg
      - POSTGRES_USER=cellseg
      - POSTGRES_PASSWORD=cellseg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cellseg"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  cvat:
    image: cvat/server:latest
    expose:
      - "8080"
    environment:
      - DJANGO_ALLOWED_HOSTS=localhost
      - CVAT_POSTGRES_HOST=db
      - CVAT_POSTGRES_DBNAME=cellseg
      - CVAT_POSTGRES_USER=cellseg
      - CVAT_POSTGRES_PASSWORD=cellseg
    volumes:
      - images_volume:/data/images
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  images_volume:
  results_volume:
