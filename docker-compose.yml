services:
  app:
    build: ./App_container
    ports:
      - "8001:8001"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - MODEL_URL=http://model:8000/segment
    depends_on:
      model:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  model:
    build:
      context: ./Model_container
      args:
        # Builds CUDA 12.1-enabled PyTorch into the image at build time.
        USE_CUDA: "true"
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Tells CellposeModel(gpu=True) — must match USE_CUDA above.
      - USE_GPU=true
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          # cpsam ViT-H weights (~2 GB) + CUDA activations.
          memory: 8G
