stages:
  - test
  - build
  - deploy
  - verify

variables:
  APP_NAME: "cellpose-poc"
  # PUSH_REGISTRY: address Kaniko uses to push — must be the node IP/hostname,
  # NOT localhost (localhost inside a CI pod refers to the pod, not the node).
  PUSH_REGISTRY: "10.136.94.110:32000"
  # PULL_REGISTRY: address Kubernetes uses to pull images from the registry.
  # MicroK8s nodes resolve localhost:32000 to the local registry daemon.
  PULL_REGISTRY: "localhost:32000"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  APP_DOMAIN: "${APP_NAME}.g007.imec.local"

# ── Unit tests — run before building images to catch code issues early ────────
unit-test-model:
  stage: test
  image: python:3.11-slim
  tags:
    - a40gpu
  script:
    # Install lightweight test deps — NO cellpose/torch (stubbed in tests).
    - pip install --no-cache-dir -r Model_container/tests/requirements-test.txt
    # PYTHONPATH points pytest at the FastAPI app module (app.py).
    - PYTHONPATH=${CI_PROJECT_DIR}/Model_container/cellpose_api
      pytest Model_container/tests/
        --junit-xml=junit-model.xml
        -v
  artifacts:
    when: always           # upload even when tests fail so GitLab shows failures
    reports:
      junit: junit-model.xml
    paths:
      - junit-model.xml    # also browsable via Artifacts tab
    expire_in: 30 days

# Build the Gradio App Container image
build-app:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  needs: [unit-test-model]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/App_container"
      --dockerfile "${CI_PROJECT_DIR}/App_container/Dockerfile"
      --destination "${PUSH_REGISTRY}/${APP_NAME}-app:${IMAGE_TAG}"
      --insecure

# Build the FastAPI / Cellpose Model Container image
build-model:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  needs: [unit-test-model]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/Model_container"
      --dockerfile "${CI_PROJECT_DIR}/Model_container/Dockerfile"
      --build-arg USE_CUDA=true
      --destination "${PUSH_REGISTRY}/${APP_NAME}-model:${IMAGE_TAG}"
      --insecure

# Deploy both containers via Helm (only on main branch)
deploy:
  stage: deploy
  image: alpine/helm:3.14.0
  tags:
    - a40gpu
  needs: [build-app, build-model]
  script:
    - helm upgrade --install ${APP_NAME} ./helm-chart
      --set app.image.repository=${PULL_REGISTRY}/${APP_NAME}-app
      --set app.image.tag=${IMAGE_TAG}
      --set model.image.repository=${PULL_REGISTRY}/${APP_NAME}-model
      --set model.image.tag=${IMAGE_TAG}
      --set ingress.host=${APP_DOMAIN}
      --namespace ${APP_NAME}
      --create-namespace
      --wait
      --timeout 25m0s
  only:
    - main

# ── Verify: dump server-side state into CI job output ─────────────────────────
verify:
  stage: verify
  image: bitnami/kubectl:latest
  tags:
    - a40gpu
  needs: [deploy]
  when: always
  script:
    - NS="$APP_NAME"

    - echo "===== 1. POD STATUS ====="
    - kubectl get pods -n "$NS" -o wide

    - echo "===== 2. FULL MODEL POD DESCRIBE (includes OOMKill, probe failures) ====="
    - kubectl describe pod -n "$NS" -l "app=${APP_NAME}-model"

    - echo "===== 3. MODEL LOGS — current ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-model" --tail=100 || true

    - echo "===== 4. MODEL LOGS — previous container (crash logs) ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-model" --previous --tail=100 || echo "no previous container"

    - echo "===== 5. APP LOGS — current ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-app" --tail=50 || true

    - echo "===== 6. SERVICES AND ENDPOINTS ====="
    - kubectl get svc -n "$NS"
    - kubectl get endpoints -n "$NS"

    - echo "===== 7. NODE RESOURCES ====="
    - kubectl top nodes || echo "metrics-server not available"
    - kubectl top pods -n "$NS" || echo "metrics-server not available"

    - echo "===== 8. IMAGE PULL STATUS (are new images actually running?) ====="
    - kubectl get pods -n "$NS" -o jsonpath='{range .items[*]}{.metadata.name}{" image="}{.status.containerStatuses[0].image}{" state="}{.status.containerStatuses[0].state}{"\n"}{end}'

    - echo "===== 9. WAIT FOR MODEL READY (up to 15 min) ====="
    - |
      for i in $(seq 1 90); do
        STATUS=$(kubectl get pod -n "$NS" -l "app=${APP_NAME}-model" -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "unknown")
        echo "attempt $i/90 — model ready=$STATUS"
        if [ "$STATUS" = "true" ]; then
          echo "Model is ready!"
          break
        fi
        sleep 10
      done

    - echo "===== 10. HEALTH CHECK (direct TCP from app pod) ====="
    - APP_POD=$(kubectl get pod -n "$NS" -l "app=${APP_NAME}-app" -o jsonpath='{.items[0].metadata.name}')
    - kubectl exec -n "$NS" "$APP_POD" -- python3 -c 'import httpx,sys; r=httpx.get("http://cellpose-poc-model:8000/health",timeout=15); print("health:",r.status_code,r.text); sys.exit(0 if r.status_code==200 else 1)' || true

    - echo "===== 11. SEGMENT TEST ====="
    - kubectl exec -n "$NS" "$APP_POD" -- python3 -c 'import httpx,numpy as np,io; from PIL import Image; img=np.zeros((64,64,3),dtype=np.uint8); buf=io.BytesIO(); Image.fromarray(img).save(buf,format="PNG"); buf.seek(0); r=httpx.post("http://cellpose-poc-model:8000/segment",files={"image":("t.png",buf.getvalue(),"image/png")},data={"flow_threshold":"0.4","cellprob_threshold":"0.0"},timeout=600); print("segment:",r.status_code,"masks shape:",np.load(io.BytesIO(r.content)).shape if r.status_code==200 else r.text[:200])' || true
  only:
    - main
