stages:
  - build
  - deploy
  - verify

variables:
  APP_NAME: "cellpose-poc"
  # PUSH_REGISTRY: address Kaniko uses to push — must be the node IP/hostname,
  # NOT localhost (localhost inside a CI pod refers to the pod, not the node).
  PUSH_REGISTRY: "10.136.94.110:32000"
  # PULL_REGISTRY: address Kubernetes uses to pull images from the registry.
  # MicroK8s nodes resolve localhost:32000 to the local registry daemon.
  PULL_REGISTRY: "localhost:32000"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  APP_DOMAIN: "${APP_NAME}.g007.imec.local"

# Build the Gradio App Container image
build-app:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/App_container"
      --dockerfile "${CI_PROJECT_DIR}/App_container/Dockerfile"
      --destination "${PUSH_REGISTRY}/${APP_NAME}-app:${IMAGE_TAG}"
      --insecure

# Build the FastAPI / Cellpose Model Container image
build-model:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/Model_container"
      --dockerfile "${CI_PROJECT_DIR}/Model_container/Dockerfile"
      --destination "${PUSH_REGISTRY}/${APP_NAME}-model:${IMAGE_TAG}"
      --insecure

# Deploy both containers via Helm (only on main branch)
deploy:
  stage: deploy
  image: alpine/helm:3.14.0
  tags:
    - a40gpu
  needs: [build-app, build-model]
  script:
    - helm upgrade --install ${APP_NAME} ./helm-chart
      --set app.image.repository=${PULL_REGISTRY}/${APP_NAME}-app
      --set app.image.tag=${IMAGE_TAG}
      --set model.image.repository=${PULL_REGISTRY}/${APP_NAME}-model
      --set model.image.tag=${IMAGE_TAG}
      --set ingress.host=${APP_DOMAIN}
      --namespace ${APP_NAME}
      --create-namespace
      --wait
      --timeout 10m0s
  only:
    - main

# ── Verify: dump server-side state into CI job output ─────────────────────────
# Run after deploy. Uses microk8s kubectl (available on the a40gpu runner node).
# Open the GitLab CI job "verify" to see pod status, events, and live logs.
verify:
  stage: verify
  image: alpine:3.19
  tags:
    - a40gpu
  needs: [deploy]
  when: always          # run even if deploy fails — we want the logs
  script:
    - alias kubectl='microk8s kubectl'
    - NS=${APP_NAME}

    - echo "======== POD STATUS ========"
    - microk8s kubectl get pods -n ${NS} -o wide

    - echo "======== POD EVENTS (model) ========"
    - microk8s kubectl describe pod -n ${NS} -l app=${APP_NAME}-model | grep -A 40 "Events:"

    - echo "======== POD EVENTS (app) ========"
    - microk8s kubectl describe pod -n ${NS} -l app=${APP_NAME}-app | grep -A 20 "Events:"

    - echo "======== MODEL CONTAINER LOGS (last 80 lines) ========"
    - microk8s kubectl logs -n ${NS} -l app=${APP_NAME}-model --tail=80 || true

    - echo "======== APP CONTAINER LOGS (last 40 lines) ========"
    - microk8s kubectl logs -n ${NS} -l app=${APP_NAME}-app --tail=40 || true

    - echo "======== PROBE STATUS ========"
    - microk8s kubectl get pod -n ${NS} -l app=${APP_NAME}-model -o jsonpath='{range .items[*]}{.metadata.name}{"\n  Startup:  "}{.status.conditions[?(@.type=="ContainersReady")]}{"\n  Ready:    "}{.status.containerStatuses[0].ready}{"\n  Restarts: "}{.status.containerStatuses[0].restartCount}{"\n---\n"}{end}'

    - echo "======== SERVICES ========"
    - microk8s kubectl get svc -n ${NS}

    - echo "======== HEALTH CHECK (from inside cluster via kubectl exec) ========"
    - APP_POD=$(microk8s kubectl get pod -n ${NS} -l app=${APP_NAME}-app -o jsonpath='{.items[0].metadata.name}')
    - microk8s kubectl exec -n ${NS} ${APP_POD} -- python3 -c "
        import httpx, sys
        try:
            r = httpx.get('http://${APP_NAME}-model:8000/health', timeout=10)
            print('health status:', r.status_code, r.text)
            sys.exit(0 if r.status_code == 200 else 1)
        except Exception as e:
            print('HEALTH CHECK FAILED:', type(e).__name__, e)
            sys.exit(1)
      "

    - echo "======== SEGMENT TEST (128x128 random image) ========"
    - microk8s kubectl exec -n ${NS} ${APP_POD} -- python3 -c "
        import httpx, numpy as np, io
        from PIL import Image
        img = np.zeros((128, 128, 3), dtype=np.uint8)
        buf = io.BytesIO()
        Image.fromarray(img).save(buf, format='PNG')
        buf.seek(0)
        try:
            r = httpx.post(
                'http://${APP_NAME}-model:8000/segment',
                files={'image': ('test.png', buf.getvalue(), 'image/png')},
                data={'flow_threshold': '0.4', 'cellprob_threshold': '0.0'},
                timeout=120.0
            )
            print('segment status:', r.status_code)
            if r.status_code == 200:
                masks = np.load(io.BytesIO(r.content))
                print('masks shape:', masks.shape, '— OK')
            else:
                print('ERROR:', r.text[:300])
        except Exception as e:
            print('SEGMENT TEST FAILED:', type(e).__name__, e)
      "
  only:
    - main
