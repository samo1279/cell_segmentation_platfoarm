stages:
  - test
  - build
  - deploy
  - verify

variables:
  APP_NAME: "cellpose-poc"
  # PUSH_REGISTRY: address Kaniko uses to push — must be the node IP/hostname,
  # NOT localhost (localhost inside a CI pod refers to the pod, not the node).
  PUSH_REGISTRY: "10.136.94.110:32000"
  # PULL_REGISTRY: address Kubernetes uses to pull images from the registry.
  # MicroK8s nodes resolve localhost:32000 to the local registry daemon.
  PULL_REGISTRY: "localhost:32000"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  APP_DOMAIN: "${APP_NAME}.g007.imec.local"

# ── Unit tests — run before building images to catch code issues early ────────
unit-test-model:
  stage: test
  image: python:3.11-slim
  tags:
    - a40gpu
  script:
    # Install lightweight test deps — NO cellpose/torch (stubbed in tests).
    - pip install --no-cache-dir -r Model_container/tests/requirements-test.txt
    # PYTHONPATH points pytest at the FastAPI app module (app.py).
    - PYTHONPATH=${CI_PROJECT_DIR}/Model_container/cellpose_api
      pytest Model_container/tests/
        --junit-xml=junit-model.xml
        -v
  artifacts:
    when: always           # upload even when tests fail so GitLab shows failures
    reports:
      junit: junit-model.xml
    paths:
      - junit-model.xml    # also browsable via Artifacts tab
    expire_in: 30 days

# Build the Gradio App Container image
build-app:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  needs: [unit-test-model]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/App_container"
      --dockerfile "${CI_PROJECT_DIR}/App_container/Dockerfile"
      --destination "${PUSH_REGISTRY}/${APP_NAME}-app:${IMAGE_TAG}"
      --cache=true
      --cache-repo "${PUSH_REGISTRY}/${APP_NAME}-app-cache"
      --insecure
      --insecure-pull

# Build the FastAPI / Cellpose Model Container image.
# The image is tagged with a SHA256 hash of the Model_container/ source files
# (excluding tests).  If model files do not change between commits, the hash
# stays the same → the GPU node already has the tag → imagePullPolicy:
# IfNotPresent skips the 6.8 GB pull entirely.
build-model:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  tags:
    - a40gpu
  needs: [unit-test-model]
  script:
    # Compute a stable content hash from model source files only (not tests).
    - MODEL_HASH=$(find ${CI_PROJECT_DIR}/Model_container -type f -not -path '*/tests/*' -not -path '*/__pycache__/*' -not -name '.DS_Store' -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -c1-12)
    - echo "MODEL_TAG=model-${MODEL_HASH}" > model_tag.env
    - echo "Building model image with tag model-${MODEL_HASH}"
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/Model_container"
      --dockerfile "${CI_PROJECT_DIR}/Model_container/Dockerfile"
      --build-arg BASE_IMAGE="${PUSH_REGISTRY}/${APP_NAME}-model-base:stable"
      --build-arg INSTALL_REQUIREMENTS=false
      --destination "${PUSH_REGISTRY}/${APP_NAME}-model:model-${MODEL_HASH}"
      --cache=true
      --cache-repo "${PUSH_REGISTRY}/${APP_NAME}-model-cache"
      --insecure
      --insecure-pull
  artifacts:
    reports:
      dotenv: model_tag.env
    expire_in: 1 hour

# Deploy both containers via Helm (only on main branch).
# App image uses commit SHA (changes every push).
# Model image uses content hash (unchanged unless model files changed) so
# the GPU node never re-pulls the 6.8 GB image unless necessary.
deploy:
  stage: deploy
  image: alpine/helm:3.14.0
  tags:
    - a40gpu
  needs: [build-app, build-model]
  script:
    - echo "Deploying app:${IMAGE_TAG}  model:${MODEL_TAG}"
    - helm lint ./helm-chart
    - helm template ${APP_NAME} ./helm-chart
      --set-string app.image.repository=${PULL_REGISTRY}/${APP_NAME}-app
      --set-string app.image.tag=${IMAGE_TAG}
      --set-string model.image.repository=${PULL_REGISTRY}/${APP_NAME}-model
      --set-string model.image.tag=${MODEL_TAG}
      --set-string ingress.host=${APP_DOMAIN}
      >/tmp/rendered.yaml
    # If a previous deploy was interrupted, Helm leaves a "pending" lock that
    # blocks all future upgrades.  Roll back to the last good release to clear
    # it.  If no previous release exists the rollback fails silently (|| true).
    - helm rollback ${APP_NAME} --namespace ${APP_NAME} 2>/dev/null || true
    - helm upgrade --install ${APP_NAME} ./helm-chart
      --set-string app.image.repository=${PULL_REGISTRY}/${APP_NAME}-app
      --set-string app.image.tag=${IMAGE_TAG}
      --set-string model.image.repository=${PULL_REGISTRY}/${APP_NAME}-model
      --set-string model.image.tag=${MODEL_TAG}
      --set-string ingress.host=${APP_DOMAIN}
      --namespace ${APP_NAME}
      --create-namespace
      --wait
      --timeout 12m0s
  only:
    - main

# ── Verify: dump server-side state into CI job output ─────────────────────────
verify:
  stage: verify
  image: bitnami/kubectl:latest
  tags:
    - a40gpu
  when: always
  script:
    - NS="$APP_NAME"

    - echo "===== 0. NODE LABELS AND GPU RESOURCES ====="
    - kubectl get nodes --show-labels || true
    - kubectl describe nodes | grep -E 'Name:|nvidia.com/gpu|Allocatable|Allocated resources' -A 8 || true

    - echo "===== 1. POD STATUS ====="
    - kubectl get pods -n "$NS" -o wide || true

    - echo "===== 1b. DEPLOYMENTS ====="
    - kubectl get deploy -n "$NS" -o wide || true
    - kubectl describe deploy -n "$NS" || true

    - echo "===== 1c. RECENT EVENTS ====="
    - kubectl get events -n "$NS" --sort-by=.lastTimestamp | tail -80 || true

    - echo "===== 2. FULL MODEL POD DESCRIBE (includes OOMKill, probe failures) ====="
    - kubectl describe pod -n "$NS" -l "app=${APP_NAME}-model" || true

    - echo "===== 3. MODEL LOGS — current ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-model" --tail=100 || true

    - echo "===== 4. MODEL LOGS — previous container (crash logs) ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-model" --previous --tail=100 || echo "no previous container"

    - echo "===== 5. APP LOGS — current ====="
    - kubectl logs -n "$NS" -l "app=${APP_NAME}-app" --tail=50 || true

    - echo "===== 6. SERVICES AND ENDPOINTS ====="
    - kubectl get svc -n "$NS" || true
    - kubectl get endpoints -n "$NS" || true

    - echo "===== 7. NODE RESOURCES ====="
    - kubectl top nodes || echo "metrics-server not available"
    - kubectl top pods -n "$NS" || echo "metrics-server not available"

    - echo "===== 8. IMAGE PULL STATUS (are new images actually running?) ====="
    - kubectl get pods -n "$NS" -o jsonpath='{range .items[*]}{.metadata.name}{" image="}{.status.containerStatuses[0].image}{" state="}{.status.containerStatuses[0].state}{"\n"}{end}' || true

    - echo "===== 9. WAIT FOR MODEL READY (up to 3 min) ====="
    - |
      for i in $(seq 1 18); do
        STATUS=$(kubectl get pod -n "$NS" -l "app=${APP_NAME}-model" -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "unknown")
        echo "attempt $i/18 — model ready=$STATUS"
        if [ "$STATUS" = "true" ]; then
          echo "Model is ready!"
          break
        fi
        sleep 10
      done

    - echo "===== 10. HEALTH CHECK (direct TCP from app pod) ====="
    - |
      APP_POD=$(kubectl get pod -n "$NS" -l "app=${APP_NAME}-app" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      if [ -z "$APP_POD" ]; then
        echo "No app pod found; skipping health and segment smoke tests."
      else
        kubectl exec -n "$NS" "$APP_POD" -- python3 -c 'import httpx,sys; r=httpx.get("http://cellpose-poc-model:8000/health",timeout=15); print("health:",r.status_code,r.text); sys.exit(0 if r.status_code==200 else 1)' || true
      fi

    - echo "===== 11. SEGMENT TEST ====="
    - |
      APP_POD=$(kubectl get pod -n "$NS" -l "app=${APP_NAME}-app" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
      if [ -z "$APP_POD" ]; then
        echo "No app pod found; skipping segment smoke test."
      else
        kubectl exec -n "$NS" "$APP_POD" -- python3 -c 'import httpx,numpy as np,io; from PIL import Image; img=np.zeros((64,64,3),dtype=np.uint8); buf=io.BytesIO(); Image.fromarray(img).save(buf,format="PNG"); buf.seek(0); r=httpx.post("http://cellpose-poc-model:8000/segment",files={"image":("t.png",buf.getvalue(),"image/png")},data={"flow_threshold":"0.4","cellprob_threshold":"0.0"},timeout=600); print("segment:",r.status_code,"masks shape:",np.load(io.BytesIO(r.content)).shape if r.status_code==200 else r.text[:200])' || true
      fi
  only:
    - main
